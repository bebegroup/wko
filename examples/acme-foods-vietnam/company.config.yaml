  master_index:
    node_token: "UxOkEXAMPLE123ACME"
    obj_token: "Vy3REXAMPLE123ACME"

taxonomy:
  version: "v4.1"
  philosophy: "execution-first"

  spaces:
    - { code: SYS, name: "Wiki Operating System", order: "00", icon: "⚙️", owner: "IT" }
    - { code: GEN, name: "Chung / General", order: "01", icon: "🏢", owner: "HCNS" }
    - { code: INT, name: "Nội bộ / Internal", order: "02", icon: "🤝", owner: "HCNS + Kế toán" }
    - { code: OPS, name: "Vận hành / Operations", order: "03", icon: "⚡", owner: "Operations Lead" }
    - { code: BOD, name: "Ban giám đốc / Board", order: "04", icon: "👔", owner: "CEO + BOD" }
    - { code: TMP, name: "Templates", order: "05", icon: "📋", owner: "Admin" }
    - { code: ARC, name: "Archive", order: "99", icon: "🗄", owner: "Admin", append_only: true }

  page_types:
    - { code: HUB, name: "Hub", question: "Tôi đang ở đâu trong luồng?", mandatory_per_section: true }
    - { code: MST, name: "Master", question: "Luật gốc / dữ liệu gốc là gì?", sub_types: [bridge, standalone] }
    - { code: PROC, name: "Process", question: "Ai làm, làm khi nào?", new_in_v41: true }
    - { code: SOP, name: "SOP", question: "Tôi phải làm từng bước gì?" }
    - { code: CHK, name: "Checklist", question: "Tôi đã làm đủ chưa?" }
    - { code: TMP, name: "Template", question: "Tôi dùng mẫu nào?" }
    - { code: PBK, name: "Playbook", question: "Lệch / lỗi / có nhánh?" }
    - { code: DBD, name: "Dashboard", question: "Kết quả có ổn không?", requires_real_data: true }
    - { code: POL, name: "Policy", scope: "external_only", mandatory_sections: 8 }
    - { code: DIC, name: "Dictionary" }
    - { code: GDL, name: "Guideline", new_in_v41: true }
    - { code: LOG, name: "Log" }
    - { code: IDX, name: "Index" }

  sections:
    SYS:
      - { code: "SYS-00", name: "Wiki Operating System" }
      - { code: "SYS-01", name: "Quy tắc hệ thống" }
    GEN:
      - { code: "GEN-01", name: "Nền tảng công ty" }
      - { code: "GEN-02", name: "Nhân viên mới" }
      - { code: "GEN-03", name: "Công cụ & hệ thống" }
      - { code: "GEN-04", name: "Thuật ngữ & định nghĩa" }
    INT:
      - { code: "INT-HR", name: "Nhân sự" }
      - { code: "INT-FIN", name: "Kế toán" }
      - { code: "INT-O3K", name: "Mục tiêu & KPI" }
      - { code: "INT-XFN", name: "Phối hợp liên phòng" }
    OPS:
      - { code: "OPS-CS", name: "CSKH" }
      - { code: "OPS-WH", name: "Kho vận" }
      - { code: "OPS-ECM", name: "Bán hàng đa kênh" }
      - { code: "OPS-INV", name: "Hoá đơn / Settlement" }
      - { code: "OPS-PIM", name: "PIM (catalog)" }
      - { code: "OPS-MFG", name: "Sản xuất / BOM / QC" }
      - { code: "OPS-MKT", name: "Marketing" }
      - { code: "OPS-LIVE", name: "Livestream" }
    BOD:
      - { code: "BOD-STR", name: "Chiến lược" }
      - { code: "BOD-FIN", name: "Tài chính quản trị" }
      - { code: "BOD-HR", name: "Nhân sự cấp cao" }
      - { code: "BOD-GOV", name: "Governance & Risk" }
    TMP:
      - { code: "TMP-GEN", name: "Templates chung" }
    ARC:
      - { code: "ARC-OLD", name: "Lưu trữ tài liệu cũ" }

  page_code_format: "{space}-{section_suffix}-{type}-{number:03d}"

hub_rules:
  master_hub_number: "001"
  branch_hub_min_pages: 3
  branch_patterns:
    - { name: "A — sub-area", example: "OPS-ECM với HUB-001 TikTok / HUB-002 Shopee" }
    - { name: "B — audience", example: "OPS-PIM với HUB cho CSKH/MKT/ECM/WH/FIN/LIVE/MFG" }
    - { name: "C — lifecycle/phase", example: "OPS-LIVE với HUB Trước/Trong/Sau live" }
    - { name: "D — role", example: "INT-HR với HUB Nhân viên/Leader/HCNS Ops" }
  hub_parent_required: true

execution_first:
  enforce: true
  section_formula:
    required: ["1 HUB", "1-2 MST", "1 PROC", "3-5 SOP", "1 CHK", "1 TMP", "1 PBK"]
    optional_when_needed:
      - "0-1 DBD (chỉ khi có số liệu thật)"
      - "0-1 DIC (chỉ khi thuật ngữ gây sai thao tác)"
      - "0-1 GDL (chỉ khi ảnh hưởng hành vi)"
      - "0-1 POL (chỉ external)"
  page_purpose_questions:
    - "Tôi đang ở đâu trong luồng? → HUB"
    - "Ai làm, làm khi nào? → PROC"
    - "Tôi phải làm từng bước gì? → SOP"
    - "Tôi đã làm đủ chưa? → CHK"
    - "Tôi dùng mẫu nào? → TMP"
    - "Lệch / lỗi / có nhánh? → PBK"
    - "Kết quả có ổn không? → DBD"
    - "Luật gốc / dữ liệu gốc? → MST"
  rejection_rules:
    - "Vì nên có (không phục vụ thực thi cụ thể)"
    - "DIC mà thuật ngữ không gây sai thao tác"
    - "GDL mà guideline không ảnh hưởng cách làm"
    - "DBD mà chưa có source số liệu thật"

pol_mst_rules:
  pol_scope: "external_only"
  mst_types: [bridge, standalone]
  pol_primary_owner_per_section: true
  primary_owner_table:
    "TikTok/Shopee/Web/FB policy": "OPS-ECM"
    "TikTok Ads / Meta Ads policy": "OPS-ECM"
    "Luật Lao động + BHXH + NĐ lương": "INT-HR"
    "Luật Thuế + Hóa đơn điện tử": "INT-FIN"
    "Luật Quảng cáo": "OPS-MKT"
    "Luật ATTP + QCVN": "OPS-MFG"
    "Chuẩn đóng gói VN": "OPS-WH"
    "NĐ 13/2023 dữ liệu cá nhân": "BOD-GOV"
    "Luật BVNTD / DN / Cạnh tranh": "BOD-GOV"
    "ISO / Chuẩn quốc tế": "BOD-GOV"
  pol_required_sections: 8
  mst_bridge_required_sections: 5
  cross_section_rule: "link, không copy"

